<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatorio de Sistemas de Pensiones Estatales | IPE Veracruz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --guinda: #7A1737;
            --dorado: #B28854;
            --oscuro-bg: #0d1117;
            --oscuro-card: #161b22;
            --border: #30363d;
            --texto: #c9d1d9;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--oscuro-bg); color: var(--texto); display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        .nav { padding: 1rem 2rem; background: var(--oscuro-card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav .brand { font-weight: 800; font-size: 1.2rem; color: #fff; letter-spacing: -1px; }
        .nav .brand span { color: var(--dorado); }

        /* HERO & SEARCH */
        .hero { padding: 50px 2rem; background: radial-gradient(circle at top right, var(--guinda), transparent 500px), var(--oscuro-card); text-align: center; border-bottom: 1px solid var(--border); }
        .hero h1 { font-size: 2.2rem; margin: 0; color: #fff; }
        .hero p { opacity: 0.7; margin: 10px 0 30px; }

        .search-container { max-width: 600px; margin: 0 auto; }
        .search-container input { width: 100%; padding: 16px 24px; border-radius: 50px; background: var(--oscuro-bg); border: 1px solid var(--border); color: white; font-size: 1rem; outline: none; }
        .search-container input:focus { border-color: var(--dorado); box-shadow: 0 0 15px rgba(178, 136, 84, 0.2); }

        /* GRID DE ESTADOS */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding: 40px 2rem; overflow-y: auto; }
        .state-card { background: var(--oscuro-card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; cursor: pointer; transition: 0.3s; text-align: center; }
        .state-card:hover { border-color: var(--dorado); transform: translateY(-8px); background: rgba(178, 136, 84, 0.05); }
        .state-card h3 { margin: 0; color: #fff; font-size: 1.1rem; }
        .state-card .badge { display: inline-block; margin-top: 10px; padding: 4px 12px; background: var(--guinda); font-size: 0.7rem; border-radius: 20px; font-weight: 600; }

        /* PERFIL DETALLADO */
        .profile-overlay { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: var(--oscuro-bg); z-index: 1000; transition: 0.4s; display: flex; flex-direction: column; }
        .profile-overlay.active { right: 0; }
        .profile-header { padding: 20px 2rem; background: var(--oscuro-card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: var(--guinda); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .profile-body { padding: 2rem; overflow-y: auto; }
        .exec-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .summary-box { background: var(--oscuro-card); padding: 20px; border-radius: 12px; border-left: 4px solid var(--dorado); }
        .summary-box small { font-size: 0.7rem; text-transform: uppercase; color: var(--dorado); font-weight: 700; }
        .summary-box div { font-size: 1.1rem; font-weight: 600; color: #fff; margin-top: 5px; }

        .pilares-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; }
        .data-group { background: var(--oscuro-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .data-group h4 { margin: 0 0 15px 0; color: var(--dorado); border-bottom: 1px solid var(--border); padding-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; }

        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .data-row .label { opacity: 0.6; text-align: left; padding-right: 10px; }
        .data-row .value { font-weight: 600; color: #fff; text-align: right; }
    </style>
</head>
<body>
    <nav class="nav"><div class="brand"><span></span></div></nav>
    <div class="hero">
        <h1>Observatorio de Sistemas de Pensiones Estatales</h1>
        <div class="search-container"><input type="text" id="stateSearch" placeholder="Busca un estado..." oninput="filterStates()"></div>
    </div>
    <div class="grid-container" id="statesGrid"></div>

    <div class="profile-overlay" id="profilePanel">
        <div class="profile-header">
            <h2 id="profileTitle" style="margin:0; color:var(--dorado)">Estado</h2>
            <button class="close-btn" onclick="closeProfile()">CERRAR</button>
        </div>
        <div class="profile-body">
            <div class="exec-summary" id="execSummary"></div>
            <div class="pilares-grid" id="profileData"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        let rawData = [];
        let states = [];

        Papa.parse("data.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                rawData = results.data;
                // Detectamos los estados (columnas de la 2 en adelante)
                states = results.meta.fields.slice(1).filter(s => s && s.trim() !== ""); 
                renderGrid();
            }
        });

        function renderGrid() {
            const grid = document.getElementById('statesGrid');
            grid.innerHTML = states.map(state => `
                <div class="state-card" onclick="openProfile('${state}')">
                    <h3>${state}</h3>
                    <div class="badge">CONSULTAR PERFIL</div>
                </div>
            `).join('');
        }

        function openProfile(stateName) {
            const panel = document.getElementById('profilePanel');
            document.getElementById('profileTitle').innerText = stateName;
            
            const summaryCont = document.getElementById('execSummary');
            const pilaresCont = document.getElementById('profileData');
            summaryCont.innerHTML = '';
            pilaresCont.innerHTML = '';

            // Definición de pilares
            const pilares = [
                { id: 'demo', titulo: '👥 Demografía', keywords: ['activos', 'pensionados', 'derechohabiente', 'población', 'asegurados'] },
                { id: 'actuarial', titulo: '📊 Actuarial', keywords: ['reforma', 'actuarial', 'suficiencia', 'descapitalización', 'valuación', 'prima media'] },
                { id: 'prestaciones', titulo: '💼 Prestaciones', keywords: ['préstamos', 'seguros', 'servicios', 'prestaciones', 'aguinaldo'] },
                { id: 'inversiones', titulo: '📈 Inversiones', keywords: ['inversión', 'portafolio', 'inmueble', 'rendimiento', 'reserva', 'financiera'] }
            ];

            // 1. Resumen Ejecutivo Blindado (Busca coincidencias parciales)
            const resumenKeys = ['titular', 'sistema', 'reforma'];
            resumenKeys.forEach(key => {
                const row = rawData.find(r => {
                    const firstCell = Object.values(r)[0];
                    return firstCell && firstCell.toLowerCase().includes(key);
                });
                const val = row ? row[stateName] : "N/D";
                const label = key === 'titular' ? 'Titular' : (key === 'sistema' ? 'Sistema' : 'Última Reforma');
                summaryCont.innerHTML += `<div class="summary-box"><small>${label}</small><div>${val}</div></div>`;
            });

            // 2. Crear contenedores de pilares
            pilares.forEach(p => {
                const div = document.createElement('div');
                div.className = 'data-group';
                div.innerHTML = `<h4>${p.titulo}</h4><div id="cont-${p.id}"></div>`;
                pilaresCont.appendChild(div);
            });

            // 3. Llenar datos con lógica de clasificación
            rawData.forEach(row => {
                const indicador = Object.values(row)[0];
                if (!indicador) return;
                
                const valor = row[stateName] || "N/D";
                const indLower = indicador.toLowerCase();

                let clasificado = false;
                pilares.forEach(p => {
                    if (p.keywords.some(k => indLower.includes(k))) {
                        const target = document.getElementById(`cont-${p.id}`);
                        if (target) {
                            target.innerHTML += `<div class="data-row"><span class="label">${indicador}</span><span class="value">${valor}</span></div>`;
                            clasificado = true;
                        }
                    }
                });
                
                // Si no entra en nada, va a "General" (lo metemos en Demografía por ahora)
                if(!clasificado && !resumenKeys.some(rk => indLower.includes(rk))) {
                     document.getElementById(`cont-demo`).innerHTML += `<div class="data-row"><span class="label">${indicador}</span><span class="value">${valor}</span></div>`;
                }
            });

            panel.classList.add('active');
        }

        function closeProfile() { document.getElementById('profilePanel').classList.remove('active'); }
        function filterStates() {
            const term = document.getElementById('stateSearch').value.toLowerCase();
            document.querySelectorAll('.state-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(term) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
