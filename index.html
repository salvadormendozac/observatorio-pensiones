<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatorio de Sistemas de Pensiones Estatales | IPE Veracruz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --guinda: #7A1737;
            --dorado: #B28854;
            --oscuro-bg: #0d1117;
            --oscuro-card: #161b22;
            --border: #30363d;
            --texto: #c9d1d9;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--oscuro-bg); color: var(--texto); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* NAV & HERO */
        .nav { padding: 1rem 2rem; background: var(--oscuro-card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav .brand { font-weight: 800; font-size: 1.2rem; color: #fff; letter-spacing: -1px; }
        .nav .brand span { color: var(--dorado); }

        .hero { padding: 40px 2rem; background: radial-gradient(circle at top right, var(--guinda), transparent 500px), var(--oscuro-card); text-align: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .hero h1 { font-size: 1.8rem; margin: 0; color: #fff; letter-spacing: 1px; }
        
        .search-container { max-width: 500px; margin: 20px auto 0; }
        .search-container input { width: 100%; padding: 14px 24px; border-radius: 50px; background: var(--oscuro-bg); border: 1px solid var(--border); color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .search-container input:focus { border-color: var(--dorado); }

        /* GRID DE ESTADOS */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 30px 2rem; overflow-y: auto; flex-grow: 1; }
        .state-card { background: var(--oscuro-card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; cursor: pointer; transition: 0.3s; text-align: center; }
        .state-card:hover { border-color: var(--dorado); transform: translateY(-5px); background: rgba(178, 136, 84, 0.05); }
        .state-card h3 { margin: 0; color: #fff; font-size: 1rem; text-transform: uppercase; }
        .state-card .badge { display: inline-block; margin-top: 15px; padding: 5px 15px; background: var(--guinda); font-size: 0.7rem; border-radius: 20px; font-weight: 700; color: white; }

        /* PERFIL OVERLAY */
        .profile-overlay { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: var(--oscuro-bg); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .profile-overlay.active { right: 0; }
        .profile-header { padding: 15px 2rem; background: var(--oscuro-card); border-bottom: 2px solid var(--guinda); display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: var(--guinda); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .profile-body { padding: 20px; overflow-y: auto; flex-grow: 1; }
        
        /* RESUMEN SUPERIOR */
        .exec-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .summary-box { background: var(--oscuro-card); padding: 15px; border-radius: 10px; border-left: 4px solid var(--dorado); }
        .summary-box small { font-size: 0.65rem; text-transform: uppercase; color: var(--dorado); font-weight: 800; display: block; margin-bottom: 5px; }
        .summary-box div { font-size: 0.95rem; font-weight: 600; color: #fff; }

        /* PILARES */
        .pilares-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .data-group { background: var(--oscuro-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: fit-content; }
        .data-group h4 { margin: 0 0 15px 0; color: var(--dorado); border-bottom: 1px solid var(--border); padding-bottom: 10px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; line-height: 1.5; }
        .data-row .label { opacity: 0.65; text-align: left; padding-right: 15px; width: 45%; }
        .data-row .value { font-weight: 600; color: #fff; text-align: right; width: 55%; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Observatorio de Pensiones Estatales</h1>
        <div class="search-container">
            <input type="text" id="stateSearch" placeholder="Busca un instituto o estado..." oninput="filterStates()">
        </div>
    </div>

    <div class="grid-container" id="statesGrid"></div>

    <div class="profile-overlay" id="profilePanel">
        <div class="profile-header">
            <h2 id="profileTitle" style="margin:0; color: var(--dorado);">Estado</h2>
            <button class="close-btn" onclick="closeProfile()">CERRAR PERFIL</button>
        </div>
        <div class="profile-body">
            <div class="exec-summary" id="execSummary"></div>
            <div class="pilares-grid" id="profileData"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        let rawData = [];
        let states = [];

        Papa.parse("data.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                rawData = results.data;
                states = results.meta.fields.slice(1).filter(s => s && s.trim() !== "");
                renderGrid();
            }
        });

        function renderGrid() {
            const grid = document.getElementById('statesGrid');
            grid.innerHTML = states.map(state => `
                <div class="state-card" onclick="openProfile('${state}')">
                    <h3>${state}</h3>
                    <div class="badge">CONSULTAR PERFIL</div>
                </div>
            `).join('');
        }

        function openProfile(stateName) {
            const panel = document.getElementById('profilePanel');
            const summaryCont = document.getElementById('execSummary');
            const pilaresCont = document.getElementById('profileData');
            document.getElementById('profileTitle').innerText = stateName;
            
            summaryCont.innerHTML = '';
            pilaresCont.innerHTML = '';

            const resumenKeys = [
                { l: 'Titular', k: 'Nombre del titular' },
                { l: 'Sistema', k: 'Tipo de sistema' },
                { l: 'Reforma', k: 'Año última Reforma' },
                { l: 'Cuota Trab.', k: 'Cuotas Trabajador (%)' },
                { l: 'Aport. Edo.', k: 'Aportación Estado (%)' },
                { l: 'Sectorizado', k: 'Adscripción / Sectorizado' }
            ];

            resumenKeys.forEach(item => {
                const row = rawData.find(r => r["INDICADOR"] === item.k);
                const val = (row && row[stateName]) ? row[stateName] : "N/D";
                summaryCont.innerHTML += `<div class="summary-box"><small>${item.l}</small><div>${val}</div></div>`;
            });

            const pilares = [
                { id: 'demo', titulo: '👥 Demografía y Derechohabiencia', keywords: ['Derechohabiente', 'Pensionista', 'Activa', 'Activo', 'Relación Activo', 'Sueldo Regulador', 'Límites', 'Salario promedio'] },
                { id: 'actuarial', titulo: '📊 Salud Actuarial y Financiera', keywords: ['descapitalización', 'Valuación', 'Estudio Actuarial', 'Prima Media', 'Subsidio', 'Balance', 'Déficit', 'Cuota', 'Aportación'] },
                { id: 'prestaciones', titulo: '💼 Prestaciones y Servicios', keywords: ['Jubilación', 'Vejez', 'Invalidez', 'viudez', 'Aguinaldo', 'Préstamos', 'Salud', 'Seguros', 'Catálogo'] },
                { id: 'inversiones', titulo: '📈 Inversiones y Patrimonio', keywords: ['Portafolio', 'Reservas', 'Rendimiento', 'Inmuebles', 'Inversiones: Otros', 'Reserva Técnica', 'Valor del Portafolio', 'Renta'] }
            ];

            pilares.forEach(p => {
                const div = document.createElement('div');
                div.className = 'data-group';
                div.innerHTML = `<h4>${p.titulo}</h4><div id="cont-${p.id}"></div>`;
                pilaresCont.appendChild(div);
            });

            rawData.forEach(row => {
                const indicador = row["INDICADOR"];
                const valor = row[stateName] || "N/D";
                if (!indicador || resumenKeys.some(rk => rk.k === indicador)) return;
                if (indicador.includes("Bloque")) return;

                let clasificado = false;
                for (const p of pilares) {
                    if (p.keywords.some(k => indicador.toLowerCase().includes(k.toLowerCase()))) {
                        document.getElementById(`cont-${p.id}`).innerHTML += `
                            <div class="data-row">
                                <span class="label">${indicador}</span>
                                <span class="value">${valor}</span>
                            </div>`;
                        clasificado = true;
                        break;
                    }
                }
                
                if (!clasificado && valor !== "N/D" && indicador !== "INDICADOR") {
                    document.getElementById('cont-demo').innerHTML += `<div class="data-row"><span class="label">${indicador}</span><span class="value">${valor}</span></div>`;
                }
            });

            panel.classList.add('active');
        }

        function closeProfile() { document.getElementById('profilePanel').classList.remove('active'); }
        function filterStates() {
            const term = document.getElementById('stateSearch').value.toLowerCase();
            document.querySelectorAll('.state-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(term) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
