<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatorio de Sistemas de Pensiones Estatales | IPE Veracruz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --guinda: #7A1737;
            --dorado: #B28854;
            --oscuro-bg: #0d1117;
            --oscuro-card: #161b22;
            --border: #30363d;
            --texto: #c9d1d9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; background: var(--oscuro-bg); color: var(--texto); 
            display: flex; flex-direction: column; height: 100vh;
        }

        /* HEADER */
        .nav {
            padding: 1rem 2rem; background: var(--oscuro-card);
            border-bottom: 1px solid var(--border); display: flex;
            justify-content: space-between; align-items: center;
        }
        .nav .brand { font-weight: 800; font-size: 1.2rem; color: #fff; letter-spacing: -1px; }
        .nav .brand span { color: var(--dorado); }

        /* HERO & SEARCH */
        .hero {
            padding: 50px 2rem; background: radial-gradient(circle at top right, var(--guinda), transparent 500px), var(--oscuro-card);
            text-align: center; border-bottom: 1px solid var(--border);
        }
        .hero h1 { font-size: 2.2rem; margin: 0; color: #fff; }
        .hero p { opacity: 0.7; margin: 10px 0 30px; }

        .search-container { max-width: 600px; margin: 0 auto; }
        .search-container input {
            width: 100%; padding: 16px 24px; border-radius: 50px; background: var(--oscuro-bg);
            border: 1px solid var(--border); color: white; font-size: 1rem; outline: none;
            transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--dorado); box-shadow: 0 0 15px rgba(178, 136, 84, 0.2); }

        /* GRID DE ESTADOS */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px; padding: 40px 2rem; overflow-y: auto;
        }

        .state-card {
            background: var(--oscuro-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 25px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center; position: relative;
        }
        .state-card:hover { 
            border-color: var(--dorado); transform: translateY(-8px); 
            background: rgba(178, 136, 84, 0.05);
        }
        .state-card h3 { margin: 0; color: #fff; font-size: 1.1rem; }
        .state-card .badge { 
            display: inline-block; margin-top: 10px; padding: 4px 12px; 
            background: var(--guinda); font-size: 0.7rem; border-radius: 20px; font-weight: 600;
        }

        /* PERFIL DETALLADO (OVERLAY) */
        .profile-overlay {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: var(--oscuro-bg); z-index: 1000; transition: 0.4s;
            display: flex; flex-direction: column;
        }
        .profile-overlay.active { right: 0; }

        .profile-header {
            padding: 20px 2rem; background: var(--oscuro-card);
            border-bottom: 1px solid var(--border); display: flex;
            justify-content: space-between; align-items: center;
        }
        .profile-header h2 { margin: 0; color: var(--dorado); }
        .close-btn { 
            background: var(--guinda); color: white; border: none; 
            padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }

        .profile-body { padding: 2rem; overflow-y: auto; }

        /* RESUMEN EJECUTIVO */
        .exec-summary {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;
        }
        .summary-box {
            background: var(--oscuro-card); padding: 20px; border-radius: 12px; border-left: 4px solid var(--dorado);
        }
        .summary-box small { font-size: 0.7rem; text-transform: uppercase; color: var(--dorado); font-weight: 700; }
        .summary-box div { font-size: 1.1rem; font-weight: 600; color: #fff; margin-top: 5px; }

        /* GRID DE PILARES */
        .pilares-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px;
        }

        .data-group { background: var(--oscuro-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: fit-content; }
        .data-group h4 { margin: 0 0 15px 0; color: var(--dorado); border-bottom: 1px solid var(--border); padding-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; }

        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .data-row .label { opacity: 0.6; padding-right: 15px; text-align: left; }
        .data-row .value { font-weight: 600; color: #fff; text-align: right; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="brand">DATA<span>PENSIONES</span>MX</div>
        <div style="font-size: 0.8rem; opacity: 0.8;">IPE Veracruz | Inteligencia Administrativa</div>
    </nav>

    <div class="hero">
        <h1>Observatorio de Sistemas de Pensiones Estatales</h1>
        <p>Explora indicadores técnicos de Institutos Estatales de Pensiones en México.</p>
        <div class="search-container">
            <input type="text" id="stateSearch" placeholder="Busca un estado o instituto..." oninput="filterStates()">
        </div>
    </div>

    <div class="grid-container" id="statesGrid"></div>

    <div class="profile-overlay" id="profilePanel">
        <div class="profile-header">
            <h2 id="profileTitle">Estado</h2>
            <button class="close-btn" onclick="closeProfile()">CERRAR PERFIL</button>
        </div>
        <div class="profile-body">
            <div class="exec-summary" id="execSummary"></div>
            <div class="pilares-grid" id="profileData"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        let rawData = [];
        let states = [];

        Papa.parse("data.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                rawData = results.data;
                states = results.meta.fields.slice(1);
                renderGrid();
            }
        });

        function renderGrid() {
            const grid = document.getElementById('statesGrid');
            grid.innerHTML = states.map(state => `
                <div class="state-card" onclick="openProfile('${state}')">
                    <h3>${state}</h3>
                    <div class="badge">CONSULTAR PERFIL</div>
                </div>
            `).join('');
        }

        function openProfile(stateName) {
            const panel = document.getElementById('profilePanel');
            const summaryCont = document.getElementById('execSummary');
            const pilaresCont = document.getElementById('profileData');
            document.getElementById('profileTitle').innerText = stateName;
            
            summaryCont.innerHTML = '';
            pilaresCont.innerHTML = '';

            // 1. Lógica para Resumen Ejecutivo (3 segundos)
            const resumenKeys = [
                { label: 'Titular', key: 'Nombre del titular' },
                { label: 'Sistema', key: 'Tipo de sistema' },
                { label: 'Última Reforma', key: 'Año última Reforma' }
            ];

            resumenKeys.forEach(item => {
                const row = rawData.find(r => r["INDICADOR"].toLowerCase().includes(item.key.toLowerCase()));
                const val = row ? row[stateName] : "N/D";
                summaryCont.innerHTML += `
                    <div class="summary-box">
                        <small>${item.label}</small>
                        <div>${val}</div>
                    </div>`;
            });

            // 2. Lógica para Pilares Estratégicos
            const pilares = [
                { id: 'demo', titulo: '👥 Demografía y Seguridad Social', keywords: ['asegurados', 'activos', 'pensionados', 'derechohabiente', 'jubilación', 'edad'] },
                { id: 'actuarial', titulo: '📊 Salud Actuarial y Financiera', keywords: ['actuarial', 'suficiencia', 'subsidio', 'valuación', 'prima media', 'financiamiento', 'descapitalización'] },
                { id: 'prestaciones', titulo: '💼 Prestaciones y Servicios', keywords: ['seguros', 'préstamos', 'servicios', 'prestaciones', 'salud', 'aguinaldo'] },
                { id: 'inversiones', titulo: '📈 Inversiones y Patrimonio', keywords: ['inversión', 'portafolio', 'inmueble', 'deuda', 'renta variable', 'rendimiento', 'reserva', 'patrimonio'] }
            ];

            // Crear los contenedores de los pilares
            const pilarElements = {};
            pilares.forEach(p => {
                const div = document.createElement('div');
                div.className = 'data-group';
                div.innerHTML = `<h4>${p.titulo}</h4><div id="cont-${p.id}"></div>`;
                pilaresCont.appendChild(div);
                pilarElements[p.id] = div.querySelector(`#cont-${p.id}`);
            });

            // Clasificar indicadores del Excel en los pilares
            rawData.forEach(row => {
                const indicador = row["INDICADOR"];
                const valor = row[stateName] || "N/D";
                const indLower = indicador.toLowerCase();

                // Saltamos si es una fila de categoría vacía en el Excel
                const esCategoria = states.every(s => !row[s] || row[s].trim() === "");
                if (esCategoria) return;

                let clasificado = false;
                for (const p of pilares) {
                    if (p.keywords.some(k => indLower.includes(k))) {
                        pilarElements[p.id].innerHTML += `
                            <div class="data-row">
                                <span class="label">${indicador}</span>
                                <span class="value">${valor}</span>
                            </div>`;
                        clasificado = true;
                        break;
                    }
                }

                // Si no entra en ningún pilar específico, lo mandamos a un grupo general o al primero
                if (!clasificado && !resumenKeys.some(rk => indLower.includes(rk.key.toLowerCase()))) {
                    pilarElements['demo'].innerHTML += `
                        <div class="data-row">
                            <span class="label">${indicador}</span>
                            <span class="value">${valor}</span>
                        </div>`;
                }
            });

            panel.classList.add('active');
        }

        function closeProfile() {
            document.getElementById('profilePanel').classList.remove('active');
        }

        function filterStates() {
            const term = document.getElementById('stateSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.state-card');
            cards.forEach(card => {
                const name = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
